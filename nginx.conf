server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión para texto/HTML/CSS/JS/SVG (reduce el tamaño de transferencia).
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml
        application/manifest+json;

    # Starlight genera un HTML por ruta (sitio multi-página, no SPA):
    #   /                  -> index.html
    #   /backend/auth/     -> backend/auth/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Página 404 propia que genera Astro
    error_page 404 /404.html;

    # Assets con hash en el nombre: cache agresivo e inmutable
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
